name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build installers but do not attach them to a release'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
            artifact_glob: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest-mac.yml
          - os: windows-latest
            platform: win
            artifact_glob: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
          - os: ubuntu-latest
            platform: linux
            artifact_glob: |
              dist/*.AppImage
              dist/latest-linux.yml

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Linux needs ALSA headers for the `audify` native module.
      - name: Install Linux native deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install dependencies
        run: npm ci

      - name: Build & package (macOS, signed if secrets are set)
        if: matrix.platform == 'mac'
        env:
          # Signing — only set in repo secrets for release builds.
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Disable gatekeeper validation during build (runs on CI without keychain).
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CERTIFICATE_P12_BASE64 != '' }}
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$APPLE_ID" ]; then
            echo "Signing + notarizing macOS build"
            npm run build
            npx electron-builder --mac dmg -c.mac.notarize=true --publish never
          else
            echo "No signing secrets — producing unsigned macOS build"
            npm run build
            npx electron-builder --mac dmg -c.mac.identity=null --publish never
          fi

      - name: Build & package (Windows)
        if: matrix.platform == 'win'
        env:
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        run: npm run dist:win -- --publish never

      - name: Build & package (Linux)
        if: matrix.platform == 'linux'
        run: npm run dist:linux -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ltc-program-changes-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Attach installers to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.zip' -o -name '*.blockmap' -o -name 'latest*.yml' \) -exec cp {} release/ \;
          ls -la release

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release/*
